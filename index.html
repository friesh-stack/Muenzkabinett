<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Münzkabinett – Weltweite Münzsortierung ab 1850</title>
<style>
:root{
  --tuch:#12241f;          /* dunkelgrünes Kabinett-Tuch */
  --tuch-hell:#1b332c;
  --karte:#f7f2e7;         /* Katalogpapier */
  --karte-rand:#e3d9c2;
  --tinte:#2a2418;
  --tinte-mild:#6b5f48;
  --gold:#c9a24b;
  --gold-hell:#e8cd8a;
  --silber:#b7bdc4;
  --kupfer:#b0693a;
  --rot:#9c3d2e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:Georgia,'Palatino Linotype','Book Antiqua',serif;
  background:var(--tuch);
  background-image:radial-gradient(ellipse at 50% -10%, #1e3a31 0%, var(--tuch) 60%);
  color:var(--karte);
  min-height:100vh;
  padding-bottom:60px;
}
header{padding:26px 16px 10px;text-align:center}
.emblem{font-size:40px;line-height:1;letter-spacing:6px}
h1{font-size:clamp(26px,6vw,40px);font-weight:normal;letter-spacing:3px;color:var(--gold-hell);margin-top:6px}
h1 small{display:block;font-size:13px;letter-spacing:4px;color:var(--silber);text-transform:uppercase;margin-top:6px;font-family:'Segoe UI',system-ui,sans-serif}
.zierlinie{width:180px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto}

.steuer{max-width:980px;margin:0 auto;padding:0 14px}
.suchzeile{display:flex;gap:8px}
.suche{
  flex:1;padding:13px 16px;border-radius:999px;border:1px solid #3a5449;
  background:var(--tuch-hell);color:var(--karte);font-size:16px;font-family:inherit;outline:none;
}
.suche::placeholder{color:#7e9488}
.suche:focus{border-color:var(--gold)}
.knopf-rund{
  width:48px;height:48px;border-radius:50%;border:1px solid #3a5449;background:var(--tuch-hell);
  color:var(--gold-hell);font-size:20px;cursor:pointer;flex:none;
}
.filter{display:flex;gap:8px;overflow-x:auto;padding:12px 2px;scrollbar-width:none}
.filter::-webkit-scrollbar{display:none}
.chip{
  flex:none;padding:8px 15px;border-radius:999px;border:1px solid #3a5449;background:transparent;
  color:var(--silber);font-size:14px;cursor:pointer;font-family:'Segoe UI',system-ui,sans-serif;
}
.chip.aktiv{background:var(--gold);border-color:var(--gold);color:#241c08;font-weight:600}
.statistik{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:#8fa398;padding:2px 4px 12px}
.statistik b{color:var(--gold-hell);font-weight:600}

.raster{max-width:980px;margin:0 auto;padding:0 14px;display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:680px){.raster{grid-template-columns:1fr 1fr}}

.karte{
  background:var(--karte);color:var(--tinte);border-radius:10px;padding:14px 16px;
  border:1px solid var(--karte-rand);box-shadow:0 3px 12px rgba(0,0,0,.35);
  cursor:pointer;position:relative;
}
.karte:active{transform:scale(.99)}
.kopfzeile{display:flex;align-items:flex-start;gap:12px}
.flagge{font-size:34px;line-height:1.2;flex:none;filter:drop-shadow(0 1px 1px rgba(0,0,0,.2))}
.landname{font-size:19px;font-weight:bold;letter-spacing:.3px}
.zeitraum{font-family:'Segoe UI',system-ui,sans-serif;font-size:12px;color:var(--tinte-mild);margin-top:1px}
.hist{display:inline-block;font-family:'Segoe UI',system-ui,sans-serif;font-size:10px;letter-spacing:1px;
  background:var(--tinte);color:var(--gold-hell);border-radius:3px;padding:2px 6px;vertical-align:2px;margin-left:6px}
.waehrungen{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.waehrung{display:flex;justify-content:space-between;gap:10px;border-bottom:1px dotted #d8ccb0;padding-bottom:4px;font-size:14.5px}
.waehrung:last-child{border-bottom:none}
.w-name{font-style:italic}
.w-zeit{font-family:'Segoe UI',system-ui,sans-serif;font-size:12.5px;color:var(--tinte-mild);white-space:nowrap}
.fusszeile{display:flex;justify-content:space-between;align-items:center;margin-top:11px}
.kurs{font-family:'Segoe UI',system-ui,sans-serif;font-size:12.5px;color:#5c5136;background:#efe6cf;border:1px solid #ddd0ae;border-radius:6px;padding:4px 9px}
.kurs.euro{background:#e3ead9;border-color:#c8d4b6;color:#3c5228}
.kurs.hist{background:#e8e2d4;color:#8a7f66}

/* Sammlungszähler als Münze */
.zaehler{display:flex;align-items:center;gap:8px}
.muenzknopf{
  width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;font-size:20px;line-height:1;
  color:#3a2c10;font-family:Georgia,serif;
  background:radial-gradient(circle at 32% 28%, #f4e2ab, var(--gold) 58%, #8a6a25 100%);
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.35), inset 0 0 0 5px rgba(120,88,20,.35), 0 2px 4px rgba(0,0,0,.3);
}
.muenzknopf.minus{
  background:radial-gradient(circle at 32% 28%, #e6c9a8, var(--kupfer) 58%, #6f3d1c 100%);
  color:#fff;
}
.anzahl{min-width:34px;text-align:center;font-size:18px;font-weight:bold;color:var(--tinte)}
.anzahl.leer{color:#c0b394}

/* Detailansicht */
.schleier{position:fixed;inset:0;background:rgba(8,17,14,.75);backdrop-filter:blur(3px);display:none;z-index:50}
.schleier.offen{display:flex;align-items:flex-end;justify-content:center}
@media(min-width:680px){.schleier.offen{align-items:center}}
.detail{
  background:var(--karte);color:var(--tinte);width:100%;max-width:640px;max-height:88vh;overflow-y:auto;
  border-radius:18px 18px 0 0;padding:22px 20px 34px;position:relative;
}
@media(min-width:680px){.detail{border-radius:14px}}
.schliessen{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;border:1px solid var(--karte-rand);
  background:#efe6cf;font-size:17px;cursor:pointer;color:var(--tinte)}
.d-flagge{font-size:52px}
.d-name{font-size:26px;font-weight:bold;margin-top:4px}
.d-abschnitt{font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  color:var(--tinte-mild);margin:20px 0 8px;border-bottom:1px solid var(--karte-rand);padding-bottom:4px}
.d-text{font-size:15.5px;line-height:1.65;white-space:pre-wrap}
.d-text.warten{color:var(--tinte-mild);font-style:italic}
.ki-knopf{
  margin-top:8px;padding:12px 18px;border-radius:8px;border:none;cursor:pointer;width:100%;
  background:var(--tinte);color:var(--gold-hell);font-size:15px;font-family:inherit;letter-spacing:.5px;
}
.hinweis{font-family:'Segoe UI',system-ui,sans-serif;font-size:11.5px;color:#9a8f76;margin-top:14px;line-height:1.5}

/* Einstellungen */
.einst-feld{width:100%;padding:11px 13px;border:1px solid var(--karte-rand);border-radius:8px;font-size:14px;margin-top:6px;font-family:'Segoe UI',system-ui,sans-serif}
.leer-meldung{grid-column:1/-1;text-align:center;color:#7e9488;padding:40px 10px;font-style:italic}
footer{text-align:center;font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;color:#5f7268;padding:34px 20px 10px;line-height:1.6}

/* Aktionsleiste */
.aktionen{display:flex;gap:8px;margin-top:10px}
.aktion{
  flex:1;padding:11px 6px;border-radius:10px;border:1px solid #3a5449;background:var(--tuch-hell);
  color:var(--gold-hell);font-size:13px;cursor:pointer;font-family:'Segoe UI',system-ui,sans-serif;
}
.aktion:active{background:#25453a}

/* Katalogansicht */
.k-eintrag{display:flex;gap:12px;align-items:flex-start}
.k-foto{width:74px;height:74px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);flex:none;background:#ddd}
.k-nr{font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;letter-spacing:1px;color:var(--tinte-mild)}
.k-titel{font-size:17px;font-weight:bold}
.k-daten{font-family:'Segoe UI',system-ui,sans-serif;font-size:12.5px;color:var(--tinte-mild);margin-top:2px;line-height:1.5}
.k-beschreibung{font-size:14px;line-height:1.5;margin-top:6px}
.k-werte{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.k-wert{font-family:'Segoe UI',system-ui,sans-serif;font-size:12px;background:#efe6cf;border:1px solid #ddd0ae;border-radius:6px;padding:3px 8px;color:#5c5136}
.k-wert.ebay{background:#e3ead9;border-color:#c8d4b6;color:#3c5228}
.k-knoepfe{display:flex;gap:6px;margin-top:9px}
.k-klein{padding:7px 11px;border-radius:7px;border:1px solid var(--karte-rand);background:#efe6cf;color:var(--tinte);
  font-size:12.5px;cursor:pointer;font-family:'Segoe UI',system-ui,sans-serif}
.k-klein.gold{background:var(--tinte);color:var(--gold-hell);border-color:var(--tinte)}
.k-klein.rot{color:var(--rot)}
.k-gruppe{grid-column:1/-1;font-size:20px;color:var(--gold-hell);letter-spacing:1px;margin-top:14px;
  border-bottom:1px solid #3a5449;padding-bottom:6px}
.stapel-bild{width:100%;border-radius:10px;border:1px solid var(--karte-rand)}
.k-foto,.stapel-bild{cursor:zoom-in}
#zoomSchleier{position:fixed;inset:0;background:rgba(8,17,14,.92);display:none;z-index:80;align-items:center;justify-content:center;cursor:zoom-out}
#zoomSchleier.offen{display:flex}
#zoomBild{max-width:94vw;max-height:88vh;border-radius:10px;box-shadow:0 6px 30px rgba(0,0,0,.6)}

/* Druck */
#druckbereich{display:none}
@media print{
  body>*:not(#druckbereich){display:none!important}
  body{background:#fff;color:#000;padding:0}
  #druckbereich{display:block!important;font-family:Georgia,serif;color:#000}
  #druckbereich h2{font-size:22px;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:4px}
  #druckbereich .dr-untertitel{font-size:12px;color:#444;margin-bottom:14px}
  #druckbereich h3{font-size:16px;margin:16px 0 6px;border-bottom:1px solid #999;padding-bottom:3px;page-break-after:avoid}
  #druckbereich .dr-eintrag{display:flex;gap:10px;padding:7px 0;border-bottom:1px dotted #bbb;page-break-inside:avoid;font-size:12px;line-height:1.45}
  #druckbereich .dr-eintrag img{width:58px;height:58px;border-radius:50%;object-fit:cover;border:1px solid #888}
  #druckbereich .dr-titel{font-weight:bold;font-size:13px}
  #druckbereich .dr-stapelbild{width:100%;max-height:520px;object-fit:contain;page-break-inside:avoid;margin:8px 0}
}
</style>
</head>

  </div>
  <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none">
  <input type="file" id="stapelInput" accept="image/*" style="display:none">
  <div class="aktionen">
    <button class="aktion" id="fotoKnopf2">📷 Einzeln bestimmen</button>
    <button class="aktion" id="stapelKnopf">🔢 Stapel-Erkennung</button>

    <button class="aktion" id="katalogKnopf">📖 Katalog &amp; Druck</button>
    <button class="aktion" id="dublettenKnopf" style="border-color:var(--kupfer);color:#e8b088">🏷 Dubletten &amp; eBay</button>
  </div>
  <div class="filter" id="filter"></div>
  <div class="statistik" id="statistik"></div>
</div>

<div class="raster" id="raster"></div>

<footer>
  Umrechnungskurse sind ungefähre Richtwerte (Stand Mitte 2026, ohne Gewähr).<br>

<div class="schleier" id="schleier"><div class="detail" id="detail"></div></div>
<div id="druckbereich"></div>

function muenzSuche(begriff,raster){
  katalogAlle().then(alle=>{

    const treffer=alle.filter(m=>{
      const heu=(m.land+" "+(m.nominal||"")+" "+(m.jahr||"")+" "+(m.beschreibung||"")+" "+(m.praegestaette||"")+" "+albumName(m.album)+" "+String(m.id).padStart(4,"0")).toLowerCase();
      return heu.includes(begriff);
    });
    if(!treffer.length)return;
    const gruppe=document.createElement("div");
    gruppe.className="k-gruppe";
    gruppe.style.marginTop="0";
    gruppe.textContent=`🪙 ${treffer.length} Münze${treffer.length>1?"n":""} im Katalog gefunden`;
    const karten=treffer.slice(0,30).map(m=>katalogKarte(m));
    karten.reverse().forEach(k=>raster.insertBefore(k,raster.firstChild));
    raster.insertBefore(gruppe,raster.firstChild);
  });
}

function bildVerkleinern(datei,maxKante){
  return new Promise((ok,nein)=>{
    const leser=new FileReader();
    leser.onerror=()=>nein(new Error("Foto konnte nicht gelesen werden."));
    leser.onload=()=>{
      const bild=new Image();
      bild.onerror=()=>nein(new Error("Bildformat wird nicht unterstützt."));
      bild.onload=()=>{
        const faktor=Math.min(1,maxKante/Math.max(bild.width,bild.height));
        const c=document.createElement("canvas");
        c.width=Math.round(bild.width*faktor);
        c.height=Math.round(bild.height*faktor);
        c.getContext("2d").drawImage(bild,0,0,c.width,c.height);
        ok(c.toDataURL("image/jpeg",0.85).split(",")[1]);
      };
      bild.src=leser.result;
    };
    leser.readAsDataURL(datei);
  });
}

/* ============================================================
   MÜNZKATALOG (IndexedDB)  ·  Stapel-Erkennung  ·  Druck
   ============================================================ */
let idb=null, notModus=false;
const NOT_M="muenz_not_muenzen", NOT_F="muenz_not_fotos";
const notLesen=k=>{try{return JSON.parse(localStorage.getItem(k)||"[]");}catch(e){return [];}};
const notSchreiben=(k,v)=>{
  try{localStorage.setItem(k,JSON.stringify(v));}
  catch(e){throw new Error("Ersatzspeicher voll (ca. 5 MB). Lade die App auf GitHub Pages hoch – dort steht der volle Speicher zur Verfügung.");}
};
function notHinweis(){
  if(!notModus||document.getElementById("notBanner"))return;
  const b=document.createElement("div");
  b.id="notBanner";
  b.style.cssText="max-width:980px;margin:0 auto 10px;padding:10px 14px;background:#5c3a1e;color:#f0d9b5;border:1px solid #8a6a25;border-radius:8px;font-family:'Segoe UI',sans-serif;font-size:12.5px;line-height:1.5";
  b.innerHTML="⚠️ <b>Eingeschränkter Speicher:</b> Die App läuft als lokale Datei, deshalb ist die Katalog-Datenbank gesperrt. Es wird ein Ersatzspeicher genutzt (nur wenige Münzen, Fotos stark verkleinert). Lade die Datei ins GitHub-Repository hoch und öffne sie über die Web-Adresse – dann steht der volle Speicher bereit.";
  document.querySelector(".steuer").appendChild(b);
}
function idbOeffnen(){
  return new Promise((ok,nein)=>{
    if(idb)return ok(idb);
    if(notModus)return nein(new Error("__NOTMODUS__"));
    let anfrage;
    try{anfrage=indexedDB.open("muenzkatalog",2);}
    catch(e){notModus=true;notHinweis();return nein(new Error("__NOTMODUS__"));}
    anfrage.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains("muenzen"))d.createObjectStore("muenzen",{keyPath:"id",autoIncrement:true});
      if(!d.objectStoreNames.contains("fotos"))d.createObjectStore("fotos",{keyPath:"id",autoIncrement:true});
    };
    anfrage.onsuccess=e=>{idb=e.target.result;ok(idb);};
    anfrage.onblocked=()=>nein(new Error("Die Katalog-Datenbank wird noch von einem anderen offenen Tab benutzt. Bitte andere Tabs mit der App schließen und erneut versuchen."));
    anfrage.onerror=()=>{notModus=true;notHinweis();nein(new Error("__NOTMODUS__"));};
  });
}
const istNot=f=>f&&f.message==="__NOTMODUS__";
async function fotoSpeichern(b64){
  let d;
  try{d=await idbOeffnen();}
  catch(f){
    if(!istNot(f))throw f;
    const klein=await verkleinernAusB64(b64,900);   // Ersatzspeicher ist knapp
    const liste=notLesen(NOT_F);
    const id=(liste.reduce((a,x)=>Math.max(a,x.id||0),0))+1;
    liste.push({id:id,b64:klein,datum:new Date().toISOString()});
    while(liste.length>3)liste.shift();             // nur die letzten Originalfotos behalten
    notSchreiben(NOT_F,liste);
    return id;
  }
  return new Promise(ok=>{
    const tx=d.transaction("fotos","readwrite");
    const r=tx.objectStore("fotos").add({b64:b64,datum:new Date().toISOString()});
    tx.oncomplete=()=>ok(r.result);
  });
}
async function fotoLaden(id){
  let d;
  try{d=await idbOeffnen();}
  catch(f){
    if(!istNot(f))throw f;
    return notLesen(NOT_F).find(x=>x.id===id)||null;
  }
  return new Promise(ok=>{
    const r=d.transaction("fotos").objectStore("fotos").get(id);
    r.onsuccess=()=>ok(r.result);r.onerror=()=>ok(null);
  });
}
async function katalogSpeichern(eintrag){
  let d;
  try{d=await idbOeffnen();}
  catch(f){
    if(!istNot(f))throw f;
    const liste=notLesen(NOT_M);
    eintrag.id=(liste.reduce((a,m)=>Math.max(a,m.id||0),0))+1;
    liste.push(eintrag);notSchreiben(NOT_M,liste);return;
  }
  return new Promise((ok,nein)=>{
    const tx=d.transaction("muenzen","readwrite");
    tx.objectStore("muenzen").add(eintrag);
    tx.oncomplete=ok;
    tx.onabort=()=>nein(new Error("Speichern abgebrochen: "+(tx.error&&tx.error.message||"Speicherplatz voll?")));
    tx.onerror=()=>nein(new Error("Speichern fehlgeschlagen: "+(tx.error&&tx.error.message||"unbekannt")));
  });
}
async function katalogAktualisieren(eintrag){
  let d;
  try{d=await idbOeffnen();}
  catch(f){
    if(!istNot(f))throw f;
    const liste=notLesen(NOT_M).map(m=>m.id===eintrag.id?eintrag:m);
    notSchreiben(NOT_M,liste);return;
  }
  return new Promise(ok=>{const tx=d.transaction("muenzen","readwrite");tx.objectStore("muenzen").put(eintrag);tx.oncomplete=ok;});
}
async function katalogLoeschen(id){
  let d;
  try{d=await idbOeffnen();}
  catch(f){
    if(!istNot(f))throw f;
    notSchreiben(NOT_M,notLesen(NOT_M).filter(m=>m.id!==id));return;
  }
  return new Promise(ok=>{const tx=d.transaction("muenzen","readwrite");tx.objectStore("muenzen").delete(id);tx.oncomplete=ok;});
}
async function katalogAlle(){
  let d;
  try{d=await idbOeffnen();}
  catch(f){
    if(!istNot(f))throw f;
    notHinweis();return notLesen(NOT_M);
  }
  return new Promise(ok=>{
    const anfrage=d.transaction("muenzen").objectStore("muenzen").getAll();
    anfrage.onsuccess=()=>ok(anfrage.result||[]);
  });
}
function verkleinernAusB64(b64,maxKante){
  return new Promise(ok=>{
    const bild=new Image();
    bild.onload=()=>{
      const faktor=Math.min(1,maxKante/Math.max(bild.width,bild.height));
      const c=document.createElement("canvas");
      c.width=Math.round(bild.width*faktor);c.height=Math.round(bild.height*faktor);
      c.getContext("2d").drawImage(bild,0,0,c.width,c.height);
      ok(c.toDataURL("image/jpeg",0.8).split(",")[1]);
    };
    bild.src="data:image/jpeg;base64,"+b64;
  });
}
function bildLaden(b64){
  return new Promise(ok=>{const b=new Image();b.onload=()=>ok(b);b.src="data:image/jpeg;base64,"+b64;});
}
/* Findet die Münze im Umfeld der KI-Koordinaten per Pixelanalyse und zentriert exakt */
function autoZentrieren(bild,x,y,r){
  const R=Math.max(40,r*1.9), s=96;
  const c=document.createElement("canvas");c.width=s;c.height=s;
  const z=c.getContext("2d");
  z.fillStyle="#000";z.fillRect(0,0,s,s);
  z.drawImage(bild,x-R,y-R,2*R,2*R,0,0,s,s);
  let d;try{d=z.getImageData(0,0,s,s).data;}catch(e){return{x:x,y:y,r:r};}
  let hr=0,hg=0,hb=0,hn=0;
  [[0,0],[s-6,0],[0,s-6],[s-6,s-6]].forEach(ecke=>{
    for(let j=0;j<6;j++)for(let i=0;i<6;i++){
      const p=((ecke[1]+j)*s+(ecke[0]+i))*4;hr+=d[p];hg+=d[p+1];hb+=d[p+2];hn++;
    }
  });
  hr/=hn;hg/=hn;hb/=hn;
  let sx=0,sy=0,n=0,minX=s,maxX=0,minY=s,maxY=0;
  for(let j=0;j<s;j++)for(let i=0;i<s;i++){
    const p=(j*s+i)*4;
    const abstand=Math.abs(d[p]-hr)+Math.abs(d[p+1]-hg)+Math.abs(d[p+2]-hb);
    if(abstand>90){sx+=i;sy+=j;n++;if(i<minX)minX=i;if(i>maxX)maxX=i;if(j<minY)minY=j;if(j>maxY)maxY=j;}
  }
  if(n<s*s*0.04||n>s*s*0.9)return{x:x,y:y,r:r};
  const faktor=2*R/s;
  return{
    x:x-R+(sx/n)*faktor,
    y:y-R+(sy/n)*faktor,
    r:Math.min(Math.max(Math.max(maxX-minX,maxY-minY)/2*faktor,r*0.5),R)
  };
}
function ausschnittPx(bild,x,y,r,groesse){
  groesse=groesse||240;
  const R=Math.max(30,r*1.3);
  const c=document.createElement("canvas");c.width=groesse;c.height=groesse;
  c.getContext("2d").drawImage(bild,x-R,y-R,2*R,2*R,0,0,groesse,groesse);
  return c.toDataURL("image/jpeg",0.82).split(",")[1];
}

async function fotoGross(m){
  let quelle="data:image/jpeg;base64,"+m.foto, rund=m.typ!=="Geldschein";
  lichtkastenZeigen(quelle,rund,`${m.nominal||"Münze"} ${m.jahr||""} · ${m.land}`,m.anmerkung?("📝 "+m.anmerkung):"");
  /* Höher aufgelösten Ausschnitt aus dem Originalfoto nachladen */
  try{
    if(m.fotoId&&m.px){
      const original=await fotoLaden(m.fotoId);
      if(original&&original.b64){
        const bild=await bildLaden(original.b64);
        const fein="data:image/jpeg;base64,"+ausschnittPx(bild,m.px.x,m.px.y,m.px.r,860);
        const img=document.querySelector("#lichtkasten img");
        if(img)img.src=fein;
      }
    }
  }catch(f){}
}

async function stapelBestimmen(b64){

    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:8000,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
        {type:"text",text:
`Auf dem Foto sind mehrere Münzen – entweder lose ausgelegt oder als Albumseite mit Steckhüllen, Münzrähmchen und Beschriftungen. Erfasse JEDE erkennbare Münze und nummeriere fortlaufend ab 1, zeilenweise von links oben nach rechts unten.

Wähle als "land" möglichst exakt einen Namen aus diesem Katalog: ${namensliste}

WICHTIG bei Albumseiten:

Antworte NUR mit einem JSON-Objekt, ohne Markdown:
{"seitenland":"falls Überschrift vorhanden, sonst leer","muenzen":[{"nr":1,"x":12.5,"y":8.3,"r":5.0,"land":"…","nominal":"z.B. 1 Franc","jahr":"falls lesbar, sonst leer","praegestaette":"falls erkennbar, sonst leer","katalognr":"z.B. S 56, sonst leer","anmerkung":"alle Beschriftungen wörtlich, sonst leer","beschreibung":"1 kurzer Satz (Motiv, Material)","sicherheit":"hoch|mittel|niedrig"}]}

x und y = Mittelpunkt der Münze in Prozent (0–100) der Bildbreite bzw. Bildhöhe, r = Münzradius in Prozent der Bildbreite. Unleserliche Münzen trotzdem aufnehmen mit sicherheit "niedrig".`}
      ]}]
    })
  });
  const daten=await antwort.json();
  const text=(daten.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
  if(!text)throw new Error(daten.error?.message||"Keine Antwort erhalten.");
  const roh=text.replace(/```json|```/g,"").trim();
  const anfang=roh.indexOf("{");
  return JSON.parse(roh.slice(anfang));
}

function nummerieren(b64,muenzen){
  return new Promise(ok=>{
    const bild=new Image();
    bild.onload=()=>{
      const c=document.createElement("canvas");
      c.width=bild.width;c.height=bild.height;
      const z=c.getContext("2d");
      z.drawImage(bild,0,0);
      const g=Math.max(16,Math.round(bild.width/45));
      muenzen.forEach(m=>{
        const x=(m.x/100)*bild.width, y=(m.y/100)*bild.height;
        z.beginPath();z.arc(x,y,g*0.95,0,7);
        z.fillStyle="rgba(201,162,75,.95)";z.fill();
        z.lineWidth=Math.max(2,g/8);z.strokeStyle="#241c08";z.stroke();
        z.fillStyle="#241c08";
        z.font="bold "+g+"px Georgia";
        z.textAlign="center";z.textBaseline="middle";
        z.fillText(m.nr,x,y+g*0.05);
      });
      ok(c.toDataURL("image/jpeg",0.85));
    };
    bild.src="data:image/jpeg;base64,"+b64;
  });
}

async function katalogAnzeigen(){
  const eintraege=await katalogAlle();

    `<b>${eintraege.length}</b> katalogisierte Münzen · <span style="cursor:pointer;text-decoration:underline" onclick="zeichnen()">← zurück zur Länderliste</span>`;

    return;
  }
  const benutzt=[...new Set(eintraege.map(m=>m.album).filter(Boolean))].sort((a,b)=>a-b);
  const gefiltert=eintraege.filter(m=>
    albumFilter==="Alle"?true:

    String(m.album)===String(albumFilter));

      <button class="chip ${albumFilter==="Alle"?"aktiv":""}" onclick="albumFilter='Alle';katalogAnzeigen()">Alle</button>

  if(!gefiltert.length){
    raster.insertAdjacentHTML("beforeend",'<div class="leer-meldung">Keine Münzen in dieser Auswahl.</div>');
    return;
  }
  /* Gruppierung: alles Deutsche unter Deutschland mit Unterbereichen */
  const gruppen={};
  gefiltert.forEach(m=>{
    const haupt=istDeutsch(m.land)?"Deutschland":m.land;
    (gruppen[haupt]=gruppen[haupt]||[]).push(m);
  });
  Object.keys(gruppen).sort((a,b)=>a.localeCompare(b,"de")).forEach(haupt=>{
    const flag=haupt==="Deutschland"?"🇩🇪":((LAENDER.find(l=>l.n===haupt)||{}).f||"❓");
    const gruppe=document.createElement("div");
    gruppe.className="k-gruppe";
    gruppe.textContent=`${flag} ${haupt} (${gruppen[haupt].length})`;
    raster.appendChild(gruppe);

      Object.keys(unter).sort((a,b)=>(a==="Deutschland"?"0":a).localeCompare(b==="Deutschland"?"0":b,"de")).forEach(teil=>{
        const u=document.createElement("div");
        u.className="k-gruppe";
        u.style.cssText="font-size:15px;color:var(--silber);border-bottom:1px dotted #3a5449;margin-top:6px";

        unter[teil].forEach(m=>raster.appendChild(katalogKarte(m)));
      });
    }else{
      gruppen[haupt].forEach(m=>raster.appendChild(katalogKarte(m)));
    }
  });
}

function ortTextEingabe(){
  const nummern=Object.keys(db.alben).sort((a,b)=>a-b);
  fotoDialog(`
    <div class="d-name">📝 Verzeichnis eintragen</div>
    <div class="d-abschnitt">Ablageort</div>
    <select class="einst-feld" id="txOrt">
      ${nummern.map(nr=>`<option value="${nr}">${nr}: ${db.alben[nr]}</option>`).join("")}
    </select>

    <div class="hinweis">Führende Nummern werden automatisch übernommen, Angaben in Klammern und Jahreszahlen als Notiz. Vorhandene Einträge bleiben erhalten.</div>
    <button class="ki-knopf" style="margin-top:12px" id="txOk">Übernehmen</button>
    <button class="ki-knopf" style="margin-top:8px;background:#efe6cf;color:var(--tinte);border:1px solid var(--karte-rand)" onclick="ortVerwalten()">← zurück</button>`);
  document.getElementById("txOk").onclick=()=>{
    const ort=document.getElementById("txOrt").value;
    const zeilen=document.getElementById("txListe").value.split("\n").map(z=>z.trim()).filter(Boolean);
    const neu=[];
    zeilen.forEach((z,i)=>{
      let rest=z.replace(/^[•\-*]\s*/,"");
      const nrTreffer=rest.match(/^(\d+)[.)]?\s+/);
      const nr=nrTreffer?parseInt(nrTreffer[1]):i+1;
      if(nrTreffer)rest=rest.slice(nrTreffer[0].length);
      let notiz="";
      const klammer=rest.match(/\(([^)]*)\)/);
      if(klammer){notiz=klammer[1].trim();rest=rest.replace(klammer[0],"");}
      const jahr=rest.match(/\b((?:1[89]|20)\d{2})\b/);
      if(jahr){notiz=(notiz?notiz+", ":"")+jahr[1];rest=rest.replace(jahr[0],"");}
      const land=rest.trim().replace(/[,;]+$/,"");
      if(land)neu.push({nr:nr,land:land,notiz:notiz});
    });
    if(!neu.length){alert("Keine Einträge erkannt.");return;}
    db.inhalt[ort]=(db.inhalt[ort]||[]).concat(neu);
    speichern();zeichnen();
    alert(neu.length+" Länder zu „"+albumName(ort)+"“ hinzugefügt.");
    ortVerwalten();
  };
}

/* ---------- Wertübersicht: Summen pro Land/Gebiet + Gesamt ---------- */
async function wertUebersicht(){
  const eintraege=await katalogAlle();
  const raster=document.getElementById("raster");
  const gruppen={};
  let gesamt=0,mitWert=0;
  eintraege.forEach(m=>{
    const haupt=istDeutsch(m.land)?"Deutschland":m.land;
    gruppen[haupt]=gruppen[haupt]||{summe:0,anzahl:0,ohne:0,teile:{}};
    gruppen[haupt].anzahl++;
    if(m.wertEuro>0){gruppen[haupt].summe+=m.wertEuro;gesamt+=m.wertEuro;mitWert++;}
    else gruppen[haupt].ohne++;
    if(haupt==="Deutschland"){
      const t=gruppen[haupt].teile[m.land]=gruppen[haupt].teile[m.land]||{summe:0,anzahl:0};
      t.anzahl++;if(m.wertEuro>0)t.summe+=m.wertEuro;
    }
  });
  const euro=z=>z.toFixed(2).replace(".",",")+" €";
  document.getElementById("statistik").innerHTML=

  let html=`<div class="karte" style="grid-column:1/-1;cursor:default">
    <div class="k-titel" style="font-size:22px">💰 Gesamtwert der Sammlung: ${euro(gesamt)}</div>

    <div class="k-knoepfe"><button class="k-klein gold" onclick="wertDrucken()">🖨 Wertliste drucken</button></div>
  </div>`;
  Object.keys(gruppen).sort((a,b)=>gruppen[b].summe-gruppen[a].summe).forEach(haupt=>{
    const g=gruppen[haupt];
    const flag=haupt==="Deutschland"?"🇩🇪":((LAENDER.find(l=>l.n===haupt)||{}).f||"❓");
    html+=`<div class="karte" style="cursor:default">
      <div class="k-titel">${flag} ${haupt}</div>
      <div class="k-daten">${g.anzahl} Stücke · ${g.ohne?g.ohne+" noch ohne Wert · ":""}</div>

      ${haupt==="Deutschland"?`<div class="waehrungen" style="margin-top:10px">${Object.keys(g.teile).sort().map(t=>`<div class="waehrung"><span class="w-name">${DE_WAPPEN[t]||"🛡️"} ${t} (${g.teile[t].anzahl})</span><span class="w-zeit">${euro(g.teile[t].summe)}</span></div>`).join("")}</div>`:""}
    </div>`;
  });
  raster.innerHTML=html;
  window._wertDaten={gruppen:gruppen,gesamt:gesamt,mitWert:mitWert,anzahl:eintraege.length};
}
function wertDrucken(){
  const d=window._wertDaten;if(!d)return;
  const euro=z=>z.toFixed(2).replace(".",",")+" €";
  const heute=new Date().toLocaleDateString("de-DE");
  let html=`<h2>💰 Wertübersicht Münzsammlung</h2>
    <div class="dr-untertitel">Stand ${heute} · ${d.mitWert} von ${d.anzahl} Stücken bewertet · Richtwerte ohne Gewähr</div>`;

/* ---------- Datensicherung (Export / Import) ---------- */
async function fotosAlle(){
  let d;
  try{d=await idbOeffnen();}
  catch(f){if(!istNot(f))throw f;return notLesen(NOT_F);}
  return new Promise(ok=>{
    const r=d.transaction("fotos").objectStore("fotos").getAll();
    r.onsuccess=()=>ok(r.result||[]);r.onerror=()=>ok([]);
  });
}
async function datenSichern(){
  const sicherung={
    version:2,datum:new Date().toISOString(),
    db:db,muenzen:await katalogAlle(),fotos:await fotosAlle()
  };
  const blob=new Blob([JSON.stringify(sicherung)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="muenzkabinett_sicherung_"+new Date().toISOString().slice(0,10)+".json";
  a.click();
}
async function datenWiederherstellen(datei){
  const text=await datei.text();
  const s=JSON.parse(text);
  if(!s.muenzen)throw new Error("Keine gültige Sicherungsdatei.");
  if(!confirm(`Sicherung vom ${new Date(s.datum).toLocaleDateString("de-DE")} mit ${s.muenzen.length} Münzen einspielen? Der aktuelle Katalog wird ersetzt.`))return;
  let d=null;
  try{d=await idbOeffnen();}catch(f){if(!istNot(f))throw f;}
  if(!d){
    notSchreiben(NOT_M,s.muenzen);
    notSchreiben(NOT_F,(s.fotos||[]).slice(-3));
  }else{
    await new Promise(ok=>{const tx=d.transaction(["muenzen","fotos"],"readwrite");tx.objectStore("muenzen").clear();tx.objectStore("fotos").clear();tx.oncomplete=ok;});
    await new Promise(ok=>{
      const tx=d.transaction(["muenzen","fotos"],"readwrite");
      s.muenzen.forEach(m=>tx.objectStore("muenzen").put(m));
      (s.fotos||[]).forEach(f=>tx.objectStore("fotos").put(f));
      tx.oncomplete=ok;
    });
  }
  if(s.db){db=s.db;db.sammlung=db.sammlung||{};db.texte=db.texte||{};db.alben=db.alben||{};speichern();}
  alert("Sicherung eingespielt: "+s.muenzen.length+" Münzen.");
  zeichnen();
}

    <button class="ki-knopf" style="margin-top:14px" id="beSpeichern">Speichern</button>`);
  document.getElementById("beAnmFoto").onclick=()=>document.getElementById("beAnmDatei").click();
  document.getElementById("beAnmDatei").onchange=async e=>{
    const datei=e.target.files[0];e.target.value="";
    if(!datei)return;
    const kn=document.getElementById("beAnmFoto");
    kn.disabled=true;kn.textContent="Lese Notiz …";
    try{
      const b64=await bildVerkleinern(datei,1200);
      const antwort=await fetch("https://blue-lagune-proxy.friesh.workers.dev/",{
        method:"POST",headers:{"Content-Type":"application/json","x-api-key":localStorage.getItem("bl_api_key")||""},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:500,messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
          {type:"text",text:"Transkribiere die handschriftliche oder gedruckte Notiz auf diesem Foto wörtlich auf Deutsch. Antworte nur mit dem Text der Notiz, ohne Kommentar."}]}]})
      });
      const daten=await antwort.json();
      const text=(daten.content||[]).filter(b=>b.type==="text").map(b=>b.text).join(" ").trim();
      if(text){const feld=document.getElementById("beAnm");feld.value=(feld.value?feld.value+" · ":"")+text;}
      kn.textContent="📷 Weitere Notiz abfotografieren";kn.disabled=false;
    }catch(f){kn.textContent="Fehler – erneut versuchen";kn.disabled=false;}
  };
  document.getElementById("beSpeichern").onclick=async()=>{
    const landAlt=m.land;
    m.land=document.getElementById("beLand").value.trim()||"Unbestimmt";
    m.nominal=document.getElementById("beNominal").value.trim();
    m.jahr=document.getElementById("beJahr").value.trim();
    m.praegestaette=document.getElementById("bePraeg").value.trim();
    m.typ=document.getElementById("beTyp").value;
    m.beschreibung=document.getElementById("beText").value.trim();
    m.anmerkung=document.getElementById("beAnm").value.trim();
    m.wertEuro=parseFloat(document.getElementById("beWert").value)||0;
    m.dublette=document.getElementById("beDub").checked;
    m.sicherheit="manuell geprüft";
    if(landAlt!==m.land){
      if(db.sammlung[landAlt]>0)db.sammlung[landAlt]--;
      if(LAENDER.find(l=>l.n===m.land))db.sammlung[m.land]=(db.sammlung[m.land]||0)+1;
      speichern();
    }
    await katalogAktualisieren(m);
    schleier.classList.remove("offen");
    katalogAnzeigen();
  };
}

    const landAlt=m.land;
    m.land=treffer?treffer.n:(erg.land||m.land);

/* ---------- Ausschnitt anpassen (auf die Münze tippen) ---------- */
async function ausschnittAnpassen(m){
  const original=await fotoLaden(m.fotoId);
  if(!original){alert("Das Originalfoto dieser Münze ist nicht mehr gespeichert.");return;}
  const bild=await bildLaden(original.b64);
  let px={x:m.px?m.px.x:bild.width/2,y:m.px?m.px.y:bild.height/2,r:m.px?m.px.r:bild.width*0.06};
  fotoDialog(`
    <div class="d-name">Ausschnitt anpassen · Nr. ${String(m.id).padStart(4,"0")}</div>
    <div class="hinweis" style="margin-top:4px">Tippe auf dem Foto auf die <b>Mitte der Münze</b> – der Ausschnitt zentriert sich automatisch. Mit dem Regler passt du die Größe an.</div>
    <div style="position:relative;margin-top:10px">
      <img id="justBild" src="data:image/jpeg;base64,${original.b64}" style="width:100%;border-radius:8px;display:block">
      <div id="justRing" style="position:absolute;border:3px solid var(--gold);border-radius:50%;pointer-events:none;box-shadow:0 0 0 2000px rgba(0,0,0,.25)"></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;margin-top:12px;font-family:'Segoe UI',sans-serif;font-size:13px;color:var(--tinte-mild)">
      Größe <input type="range" id="justGroesse" min="15" max="220" style="flex:1">
    </div>
    <div style="display:flex;gap:14px;align-items:center;margin-top:12px">
      <img id="justVorschau" class="k-foto" style="width:84px;height:84px">
      <button class="ki-knopf" style="flex:1;margin:0" id="justOk">Übernehmen</button>
    </div>`);
  const bildEl=document.getElementById("justBild");
  const ring=document.getElementById("justRing");
  const regler=document.getElementById("justGroesse");
  regler.max=Math.round(bild.width/3);regler.value=Math.round(px.r);
  function anzeigen(){
    const f=bildEl.clientWidth/bild.width;
    ring.style.left=(px.x-px.r)*f+"px";ring.style.top=(px.y-px.r)*f+"px";
    ring.style.width=ring.style.height=2*px.r*f+"px";
    document.getElementById("justVorschau").src="data:image/jpeg;base64,"+ausschnittPx(bild,px.x,px.y,px.r);
  }
  bildEl.onload=anzeigen;
  if(bildEl.complete)setTimeout(anzeigen,60);
  bildEl.onclick=e=>{
    const r=bildEl.getBoundingClientRect();
    const tipp={x:(e.clientX-r.left)/r.width*bild.width,y:(e.clientY-r.top)/r.height*bild.height};
    const fein=autoZentrieren(bild,tipp.x,tipp.y,px.r);
    px={x:fein.x,y:fein.y,r:fein.r};
    regler.value=Math.round(px.r);
    anzeigen();
  };
  regler.oninput=()=>{px.r=parseInt(regler.value);anzeigen();};
  document.getElementById("justOk").onclick=async()=>{
    m.px={x:Math.round(px.x),y:Math.round(px.y),r:Math.round(px.r)};
    m.foto=ausschnittPx(bild,px.x,px.y,px.r);
    await katalogAktualisieren(m);
    schleier.classList.remove("offen");
    katalogAnzeigen();
  };
}

/* ---------- Wert-Recherche (Katalogwert + eBay) ---------- */
async function wertRecherchieren(m,knopf){
  const key=localStorage.getItem("bl_api_key");
  if(!key){einstellungen();return;}
  knopf.disabled=true;knopf.textContent="Recherchiere …";
  const beschreibung=`${m.land}, ${m.nominal} ${m.jahr}${m.praegestaette?", Prägestätte "+m.praegestaette:""}${m.katalognr?", Katalognummer "+m.katalognr+" (Schön)":""} – ${m.beschreibung}${m.anmerkung?" · Notiz aus der Sammlung: "+m.anmerkung:""}`;
  const anfrage=(mitSuche)=>fetch("https://blue-lagune-proxy.friesh.workers.dev/",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key},
    body:JSON.stringify(Object.assign({
      model:"claude-sonnet-4-6",
      max_tokens:1500,
      messages:[{role:"user",content:
`Recherchiere den Sammlerwert dieser Münze: ${beschreibung}

Gesucht: 1) Katalogwert laut gängiger Kataloge (z.B. Jaeger, Schön, Krause/KM) als Spanne je nach Erhaltung, 2) reale Verkaufspreise, insbesondere kürzlich verkaufte vergleichbare Stücke bei eBay.

Antworte am ENDE nur mit einem JSON-Objekt:
{"katalogwert":"z.B. 2–15 € (ss–vz)","ebay":"z.B. meist 3–8 € realisiert","wertEuro":5.5,"quelle":"kurz: Basis der Angabe"}
"wertEuro" = realistischer mittlerer Einzelwert in Euro als reine Zahl (für Summenbildung).
Falls keine verlässlichen Zahlen auffindbar sind, gib eine begründete Schätzspanne mit dem Zusatz "(Schätzung)".`}]
    },mitSuche?{tools:[{type:"web_search_20250305",name:"web_search"}]}:{}))
  });
  try{
    let antwort=await anfrage(true);
    let daten=await antwort.json();
    if(daten.error){antwort=await anfrage(false);daten=await antwort.json();}
    const text=(daten.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    const passung=text.match(/\{[\s\S]*\}/);
    if(!passung)throw new Error(daten.error?.message||"Keine verwertbare Antwort.");
    const w=JSON.parse(passung[0]);
    m.katalogwert=w.katalogwert||"";
    m.ebay=w.ebay||"";
    m.wertEuro=parseFloat(w.wertEuro)||0;
    m.quelle=w.quelle||"";
    await katalogAktualisieren(m);
    katalogAnzeigen();
  }catch(fehler){
    knopf.disabled=false;knopf.textContent="Erneut versuchen";
    alert("Wert-Recherche fehlgeschlagen: "+fehler.message);
  }
}

/* ---------- Druckansicht ---------- */
async function katalogDrucken(nachAlbum){
  const eintraege=await katalogAlle();
  if(!eintraege.length){alert("Der Katalog ist leer.");return;}
  const gruppen={};
  eintraege.forEach(m=>{
    const schluessel=nachAlbum?(m.album?albumName(m.album):"Ohne Ablageort"):(istDeutsch(m.land)?"Deutschland":m.land);
    (gruppen[schluessel]=gruppen[schluessel]||[]).push(m);
  });
  const heute=new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"});
  let html=`<h2>🪙 Münzkatalog ${nachAlbum?"– nach Alben":"– nach Ländern"}</h2>
    <div class="dr-untertitel">${eintraege.length} Münzen · ${Object.keys(gruppen).length} ${nachAlbum?"Alben":"Länder"} · erstellt am ${heute} · Nummerierung = Katalog-Nr.</div>`;
  Object.keys(gruppen).sort((a,b)=>a.localeCompare(b,"de",{numeric:true})).forEach(schluessel=>{
    html+=`<h3>${schluessel} (${gruppen[schluessel].length} Münzen)</h3>`;
    gruppen[schluessel].sort((a,b)=>nachAlbum?a.land.localeCompare(b.land,"de"):a.id-b.id).forEach(m=>{
      html+=`<div class="dr-eintrag">
        <img src="data:image/jpeg;base64,${m.foto}">
        <div>
          <div class="dr-titel">Nr. ${String(m.id).padStart(4,"0")}${m.typ==="Geldschein"?" · 💵":""}${m.dublette?" · DUBLETTE":""} · ${(nachAlbum||istDeutsch(m.land))?m.land+" · ":""}${m.nominal||"Münze"} ${m.jahr||""}${m.praegestaette?" · Prägestätte "+m.praegestaette:""}${!nachAlbum&&m.album?" · "+albumName(m.album):""}</div>
          <div>${m.beschreibung||""}</div>
          ${m.anmerkung?`<div style="font-style:italic">Anmerkung: ${m.anmerkung}</div>`:""}
          <div>Katalogwert: ${m.katalogwert||"–"} &nbsp;|&nbsp; eBay real: ${m.ebay||"–"}${m.wertEuro?" &nbsp;|&nbsp; Einzelwert: "+m.wertEuro.toFixed(2).replace(".",",")+" €":""}${m.quelle?" &nbsp;|&nbsp; Quelle: "+m.quelle:""}</div>
        </div>
      </div>`;
    });
  });
  html+=`<div class="dr-untertitel" style="margin-top:14px">Werte sind Richtwerte (KI-Recherche, ohne Gewähr). Erstellt mit Münzkabinett.</div>`;
  document.getElementById("druckbereich").innerHTML=html;
  setTimeout(()=>window.print(),300);
}
