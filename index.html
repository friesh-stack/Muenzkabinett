<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Münzkabinett – Weltweite Münzsortierung ab 1850</title>
<style>
:root{
  --tuch:#12241f;          /* dunkelgrünes Kabinett-Tuch */
  --tuch-hell:#1b332c;
  --karte:#f7f2e7;         /* Katalogpapier */
  --karte-rand:#e3d9c2;
  --tinte:#2a2418;
  --tinte-mild:#6b5f48;
  --gold:#c9a24b;
  --gold-hell:#e8cd8a;
  --silber:#b7bdc4;
  --kupfer:#b0693a;
  --rot:#9c3d2e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:Georgia,'Palatino Linotype','Book Antiqua',serif;
  background:var(--tuch);
  background-image:radial-gradient(ellipse at 50% -10%, #1e3a31 0%, var(--tuch) 60%);
  color:var(--karte);
  min-height:100vh;
  padding-bottom:60px;
}
header{padding:26px 16px 10px;text-align:center}
.emblem{font-size:40px;line-height:1;letter-spacing:6px}
h1{font-size:clamp(26px,6vw,40px);font-weight:normal;letter-spacing:3px;color:var(--gold-hell);margin-top:6px}
h1 small{display:block;font-size:13px;letter-spacing:4px;color:var(--silber);text-transform:uppercase;margin-top:6px;font-family:'Segoe UI',system-ui,sans-serif}
.zierlinie{width:180px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto}

.steuer{max-width:980px;margin:0 auto;padding:0 14px}
.suchzeile{display:flex;gap:8px}
.suche{
  flex:1;padding:13px 16px;border-radius:999px;border:1px solid #3a5449;
  background:var(--tuch-hell);color:var(--karte);font-size:16px;font-family:inherit;outline:none;
}
.suche::placeholder{color:#7e9488}
.suche:focus{border-color:var(--gold)}
.knopf-rund{
  width:48px;height:48px;border-radius:50%;border:1px solid #3a5449;background:var(--tuch-hell);
  color:var(--gold-hell);font-size:20px;cursor:pointer;flex:none;
}
.filter{display:flex;gap:8px;overflow-x:auto;padding:12px 2px;scrollbar-width:none}
.filter::-webkit-scrollbar{display:none}
.chip{
  flex:none;padding:8px 15px;border-radius:999px;border:1px solid #3a5449;background:transparent;
  color:var(--silber);font-size:14px;cursor:pointer;font-family:'Segoe UI',system-ui,sans-serif;
}
.chip.aktiv{background:var(--gold);border-color:var(--gold);color:#241c08;font-weight:600}
.statistik{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:#8fa398;padding:2px 4px 12px}
.statistik b{color:var(--gold-hell);font-weight:600}

.raster{max-width:980px;margin:0 auto;padding:0 14px;display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:680px){.raster{grid-template-columns:1fr 1fr}}

.karte{
  background:var(--karte);color:var(--tinte);border-radius:10px;padding:14px 16px;
  border:1px solid var(--karte-rand);box-shadow:0 3px 12px rgba(0,0,0,.35);
  cursor:pointer;position:relative;
}
.karte:active{transform:scale(.99)}
.kopfzeile{display:flex;align-items:flex-start;gap:12px}
.flagge{font-size:34px;line-height:1.2;flex:none;filter:drop-shadow(0 1px 1px rgba(0,0,0,.2))}
.landname{font-size:19px;font-weight:bold;letter-spacing:.3px}
.zeitraum{font-family:'Segoe UI',system-ui,sans-serif;font-size:12px;color:var(--tinte-mild);margin-top:1px}
.hist{display:inline-block;font-family:'Segoe UI',system-ui,sans-serif;font-size:10px;letter-spacing:1px;
  background:var(--tinte);color:var(--gold-hell);border-radius:3px;padding:2px 6px;vertical-align:2px;margin-left:6px}
.waehrungen{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.waehrung{display:flex;justify-content:space-between;gap:10px;border-bottom:1px dotted #d8ccb0;padding-bottom:4px;font-size:14.5px}
.waehrung:last-child{border-bottom:none}
.w-name{font-style:italic}
.w-zeit{font-family:'Segoe UI',system-ui,sans-serif;font-size:12.5px;color:var(--tinte-mild);white-space:nowrap}
.fusszeile{display:flex;justify-content:space-between;align-items:center;margin-top:11px}
.kurs{font-family:'Segoe UI',system-ui,sans-serif;font-size:12.5px;color:#5c5136;background:#efe6cf;border:1px solid #ddd0ae;border-radius:6px;padding:4px 9px}
.kurs.euro{background:#e3ead9;border-color:#c8d4b6;color:#3c5228}
.kurs.hist{background:#e8e2d4;color:#8a7f66}

/* Sammlungszähler als Münze */
.zaehler{display:flex;align-items:center;gap:8px}
.muenzknopf{
  width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;font-size:20px;line-height:1;
  color:#3a2c10;font-family:Georgia,serif;
  background:radial-gradient(circle at 32% 28%, #f4e2ab, var(--gold) 58%, #8a6a25 100%);
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.35), inset 0 0 0 5px rgba(120,88,20,.35), 0 2px 4px rgba(0,0,0,.3);
}
.muenzknopf.minus{
  background:radial-gradient(circle at 32% 28%, #e6c9a8, var(--kupfer) 58%, #6f3d1c 100%);
  color:#fff;
}
.anzahl{min-width:34px;text-align:center;font-size:18px;font-weight:bold;color:var(--tinte)}
.anzahl.leer{color:#c0b394}

/* Detailansicht */
.schleier{position:fixed;inset:0;background:rgba(8,17,14,.75);backdrop-filter:blur(3px);display:none;z-index:50}
.schleier.offen{display:flex;align-items:flex-end;justify-content:center}
@media(min-width:680px){.schleier.offen{align-items:center}}
.detail{
  background:var(--karte);color:var(--tinte);width:100%;max-width:640px;max-height:88vh;overflow-y:auto;
  border-radius:18px 18px 0 0;padding:22px 20px 34px;position:relative;
}
@media(min-width:680px){.detail{border-radius:14px}}
.schliessen{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;border:1px solid var(--karte-rand);
  background:#efe6cf;font-size:17px;cursor:pointer;color:var(--tinte)}
.d-flagge{font-size:52px}
.d-name{font-size:26px;font-weight:bold;margin-top:4px}
.d-abschnitt{font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  color:var(--tinte-mild);margin:20px 0 8px;border-bottom:1px solid var(--karte-rand);padding-bottom:4px}
.d-text{font-size:15.5px;line-height:1.65;white-space:pre-wrap}
.d-text.warten{color:var(--tinte-mild);font-style:italic}
.ki-knopf{
  margin-top:8px;padding:12px 18px;border-radius:8px;border:none;cursor:pointer;width:100%;
  background:var(--tinte);color:var(--gold-hell);font-size:15px;font-family:inherit;letter-spacing:.5px;
}
.hinweis{font-family:'Segoe UI',system-ui,sans-serif;font-size:11.5px;color:#9a8f76;margin-top:14px;line-height:1.5}

/* Einstellungen */
.einst-feld{width:100%;padding:11px 13px;border:1px solid var(--karte-rand);border-radius:8px;font-size:14px;margin-top:6px;font-family:'Segoe UI',system-ui,sans-serif}
.leer-meldung{grid-column:1/-1;text-align:center;color:#7e9488;padding:40px 10px;font-style:italic}
footer{text-align:center;font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;color:#5f7268;padding:34px 20px 10px;line-height:1.6}

/* Aktionsleiste */
.aktionen{display:flex;gap:8px;margin-top:10px}
.aktion{
  flex:1;padding:11px 6px;border-radius:10px;border:1px solid #3a5449;background:var(--tuch-hell);
  color:var(--gold-hell);font-size:13px;cursor:pointer;font-family:'Segoe UI',system-ui,sans-serif;
}
.aktion:active{background:#25453a}

/* Katalogansicht */
.k-eintrag{display:flex;gap:12px;align-items:flex-start}
.k-foto{width:74px;height:74px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);flex:none;background:#ddd}
.k-nr{font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;letter-spacing:1px;color:var(--tinte-mild)}
.k-titel{font-size:17px;font-weight:bold}
.k-daten{font-family:'Segoe UI',system-ui,sans-serif;font-size:12.5px;color:var(--tinte-mild);margin-top:2px;line-height:1.5}
.k-beschreibung{font-size:14px;line-height:1.5;margin-top:6px}
.k-werte{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.k-wert{font-family:'Segoe UI',system-ui,sans-serif;font-size:12px;background:#efe6cf;border:1px solid #ddd0ae;border-radius:6px;padding:3px 8px;color:#5c5136}
.k-wert.ebay{background:#e3ead9;border-color:#c8d4b6;color:#3c5228}
.k-knoepfe{display:flex;gap:6px;margin-top:9px}
.k-klein{padding:7px 11px;border-radius:7px;border:1px solid var(--karte-rand);background:#efe6cf;color:var(--tinte);
  font-size:12.5px;cursor:pointer;font-family:'Segoe UI',system-ui,sans-serif}
.k-klein.gold{background:var(--tinte);color:var(--gold-hell);border-color:var(--tinte)}
.k-klein.rot{color:var(--rot)}
.k-gruppe{grid-column:1/-1;font-size:20px;color:var(--gold-hell);letter-spacing:1px;margin-top:14px;
  border-bottom:1px solid #3a5449;padding-bottom:6px}
.stapel-bild{width:100%;border-radius:10px;border:1px solid var(--karte-rand)}

/* Druck */
#druckbereich{display:none}
@media print{
  body>*:not(#druckbereich){display:none!important}
  body{background:#fff;color:#000;padding:0}
  #druckbereich{display:block!important;font-family:Georgia,serif;color:#000}
  #druckbereich h2{font-size:22px;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:4px}
  #druckbereich .dr-untertitel{font-size:12px;color:#444;margin-bottom:14px}
  #druckbereich h3{font-size:16px;margin:16px 0 6px;border-bottom:1px solid #999;padding-bottom:3px;page-break-after:avoid}
  #druckbereich .dr-eintrag{display:flex;gap:10px;padding:7px 0;border-bottom:1px dotted #bbb;page-break-inside:avoid;font-size:12px;line-height:1.45}
  #druckbereich .dr-eintrag img{width:58px;height:58px;border-radius:50%;object-fit:cover;border:1px solid #888}
  #druckbereich .dr-titel{font-weight:bold;font-size:13px}
  #druckbereich .dr-stapelbild{width:100%;max-height:520px;object-fit:contain;page-break-inside:avoid;margin:8px 0}
}
</style>
</head>

  <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none">

</div>

<div class="raster" id="raster"></div>

<footer>
  Umrechnungskurse sind ungefähre Richtwerte (Stand Mitte 2026, ohne Gewähr).<br>

const DB_KEY="muenz_db";
let db=JSON.parse(localStorage.getItem(DB_KEY)||"{}");
db.sammlung=db.sammlung||{};   // {Landname: Anzahl}
db.texte=db.texte||{};         // {Landname: KI-Beschreibung}
const speichern=()=>localStorage.setItem(DB_KEY,JSON.stringify(db));

let regionAktiv="Alle", suchtext="";

const filterEl=document.getElementById("filter");
REGIONEN.forEach(r=>{
  const b=document.createElement("button");
  b.className="chip"+(r==="Alle"?" aktiv":"");
  b.textContent=r;
  b.onclick=()=>{regionAktiv=r;document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("aktiv",c===b));zeichnen();};
  filterEl.appendChild(b);
});
document.getElementById("suche").addEventListener("input",e=>{suchtext=e.target.value.toLowerCase();zeichnen();});

function gefiltert(){
  return LAENDER.filter(l=>{
    if(regionAktiv==="Meine Sammlung"&&!(db.sammlung[l.n]>0))return false;
    if(regionAktiv!=="Alle"&&regionAktiv!=="Meine Sammlung"&&l.r!==regionAktiv)return false;
    if(suchtext){
      const heu=(l.n+" "+l.w.map(x=>x[0]).join(" ")).toLowerCase();
      if(!heu.includes(suchtext))return false;
    }
    return true;
  }).sort((a,b)=>a.n.localeCompare(b.n,"de"));
}

function zeichnen(){
  const liste=gefiltert();
  const raster=document.getElementById("raster");
  raster.innerHTML="";
  if(!liste.length){raster.innerHTML='<div class="leer-meldung">Kein Eintrag gefunden.</div>';}
  liste.forEach(l=>{
    const anz=db.sammlung[l.n]||0;
    const karte=document.createElement("div");
    karte.className="karte";
    const kursKlasse=l.k===null?"hist":(String(l.k).startsWith("€")?"euro":"");
    const kursText=l.k===null?"historisch – kein Kurs":(l.k==="€"?"Euro-Land":l.k);
    karte.innerHTML=`
      <div class="kopfzeile">
        <div class="flagge">${l.f}</div>
        <div>
          <div class="landname">${l.n}${l.r==="Historisch"?'<span class="hist">HISTORISCH</span>':""}</div>
          <div class="zeitraum">${l.r}</div>
        </div>
      </div>
      <div class="waehrungen">
        ${l.w.map(x=>`<div class="waehrung"><span class="w-name">${x[0]}</span><span class="w-zeit">${x[1]}</span></div>`).join("")}
      </div>
      <div class="fusszeile">
        <span class="kurs ${kursKlasse}">${kursText}</span>
        <span class="zaehler">
          <button class="muenzknopf minus" data-l="${l.n}" data-d="-1">−</button>
          <span class="anzahl ${anz?"":"leer"}">${anz}</span>
          <button class="muenzknopf" data-l="${l.n}" data-d="1">+</button>
        </span>
      </div>`;
    karte.addEventListener("click",e=>{
      const kn=e.target.closest(".muenzknopf");
      if(kn){
        e.stopPropagation();
        const name=kn.dataset.l, d=parseInt(kn.dataset.d);
        db.sammlung[name]=Math.max(0,(db.sammlung[name]||0)+d);
        speichern();zeichnen();statistik();
        return;
      }
      detailOeffnen(l);
    });
    raster.appendChild(karte);
  });
  statistik();
}

function statistik(){
  const laender=Object.keys(db.sammlung).filter(k=>db.sammlung[k]>0).length;
  const muenzen=Object.values(db.sammlung).reduce((a,b)=>a+b,0);
  document.getElementById("statistik").innerHTML=
    `<b>${LAENDER.length}</b> Prägeherren im Katalog · Sammlung: <b>${muenzen}</b> Münzen aus <b>${laender}</b> Ländern`;
}

async function beschreibungLaden(l){
  const t=document.getElementById("dText");
  const kn=document.getElementById("kiKnopf");
  const key=localStorage.getItem("bl_api_key")||"";
  if(!key){einstellungen();return;}
  kn.disabled=true;kn.textContent="Wird erstellt …";
  t.textContent="Einen Moment – die numismatische Beschreibung wird verfasst …";
  const zeitraeume=l.w.map(x=>x[0]+" ("+x[1]+")").join(", ");
  try{
    const antwort=await fetch("https://blue-lagune-proxy.friesh.workers.dev/",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:900,
        messages:[{role:"user",content:
`Schreibe eine numismatische Kurzbeschreibung zu "${l.n}" für Münzsammler auf Deutsch.

Bekannte Währungen und Umlaufzeiten: ${zeitraeume}

Inhalt: sehr kurzer landesgeschichtlicher Rahmen ab 1850 aus Sicht der Münzprägung, welche Münzen und Nominale typisch sind, verwendete Metalle, besonders bekannte oder gesuchte Stücke, praktische Bestimmungshinweise (Schrift, Motive, Prägestätten).

Form: Fließtext in 2–3 kurzen Absätzen, MAXIMAL 1500 Zeichen (eine halbe DIN-A4-Seite), keine Überschriften, keine Aufzählungszeichen. Antworte nur mit dem Text.`}]
      })
    });
    const daten=await antwort.json();
    const text=(daten.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
    if(!text)throw new Error(daten.error?.message||"Leere Antwort");
    db.texte[l.n]=text;speichern();
    t.classList.remove("warten");t.textContent=text;
    if(kn)kn.remove();
  }catch(fehler){
    t.textContent="Beschreibung konnte nicht erstellt werden: "+fehler.message;
    kn.disabled=false;kn.textContent="Erneut versuchen";
  }
}

function bildVerkleinern(datei,maxKante){
  return new Promise((ok,nein)=>{
    const leser=new FileReader();
    leser.onerror=()=>nein(new Error("Foto konnte nicht gelesen werden."));
    leser.onload=()=>{
      const bild=new Image();
      bild.onerror=()=>nein(new Error("Bildformat wird nicht unterstützt."));
      bild.onload=()=>{
        const faktor=Math.min(1,maxKante/Math.max(bild.width,bild.height));
        const c=document.createElement("canvas");
        c.width=Math.round(bild.width*faktor);
        c.height=Math.round(bild.height*faktor);
        c.getContext("2d").drawImage(bild,0,0,c.width,c.height);
        ok(c.toDataURL("image/jpeg",0.85).split(",")[1]);
      };
      bild.src=leser.result;
    };
    leser.readAsDataURL(datei);
  });
}

async function muenzeBestimmen(b64){
  const key=localStorage.getItem("bl_api_key");
  const namensliste=LAENDER.map(l=>l.n).join("; ");
  const antwort=await fetch("https://blue-lagune-proxy.friesh.workers.dev/",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:500,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
        {type:"text",text:
`Bestimme diese Münze für einen Sammler. Nutze Schrift, Wappen, Motive, Nominal und Jahreszahl auf dem Foto.

Wähle als "land" möglichst exakt einen Namen aus diesem Katalog (historische Prägeherren sind erlaubt): ${namensliste}

Antworte NUR mit einem JSON-Objekt, ohne Markdown, ohne weiteren Text:
{"land":"Name aus dem Katalog oder eigener Vorschlag","waehrung":"z.B. 50 Pfennig","jahr":"Prägejahr, falls erkennbar, sonst leer","praegestaette":"Münzzeichen/Prägeanstalt falls erkennbar (z.B. A = Berlin), sonst leer","sicherheit":"hoch|mittel|niedrig","hinweis":"1-2 Sätze: woran erkannt, ggf. Material und Besonderheiten"}`}
      ]}]
    })
  });
  const daten=await antwort.json();
  const text=(daten.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
  if(!text)throw new Error(daten.error?.message||"Keine Antwort erhalten.");
  try{
    return JSON.parse(text.replace(/```json|```/g,"").trim());
  }catch(e){
    return {land:"",waehrung:"",jahr:"",sicherheit:"niedrig",hinweis:text};
  }
}

/* ============================================================
   MÜNZKATALOG (IndexedDB)  ·  Stapel-Erkennung  ·  Druck
   ============================================================ */
let idb=null;
function idbOeffnen(){
  return new Promise((ok,nein)=>{
    if(idb)return ok(idb);
    const anfrage=indexedDB.open("muenzkatalog",1);
    anfrage.onupgradeneeded=e=>{
      e.target.result.createObjectStore("muenzen",{keyPath:"id",autoIncrement:true});
    };
    anfrage.onsuccess=e=>{idb=e.target.result;ok(idb);};
    anfrage.onerror=()=>nein(new Error("Katalog-Datenbank nicht verfügbar."));
  });
}
async function katalogSpeichern(eintrag){
  const d=await idbOeffnen();
  return new Promise((ok,nein)=>{
    const tx=d.transaction("muenzen","readwrite");
    tx.objectStore("muenzen").add(eintrag);
    tx.oncomplete=ok;tx.onerror=()=>nein(new Error("Speichern fehlgeschlagen."));
  });
}
async function katalogAktualisieren(eintrag){
  const d=await idbOeffnen();
  return new Promise(ok=>{const tx=d.transaction("muenzen","readwrite");tx.objectStore("muenzen").put(eintrag);tx.oncomplete=ok;});
}
async function katalogLoeschen(id){
  const d=await idbOeffnen();
  return new Promise(ok=>{const tx=d.transaction("muenzen","readwrite");tx.objectStore("muenzen").delete(id);tx.oncomplete=ok;});
}
async function katalogAlle(){
  const d=await idbOeffnen();
  return new Promise(ok=>{
    const anfrage=d.transaction("muenzen").objectStore("muenzen").getAll();
    anfrage.onsuccess=()=>ok(anfrage.result||[]);
  });
}
function verkleinernAusB64(b64,maxKante){
  return new Promise(ok=>{
    const bild=new Image();
    bild.onload=()=>{
      const faktor=Math.min(1,maxKante/Math.max(bild.width,bild.height));
      const c=document.createElement("canvas");
      c.width=Math.round(bild.width*faktor);c.height=Math.round(bild.height*faktor);
      c.getContext("2d").drawImage(bild,0,0,c.width,c.height);
      ok(c.toDataURL("image/jpeg",0.8).split(",")[1]);
    };
    bild.src="data:image/jpeg;base64,"+b64;
  });
}
function ausschnitt(b64,xP,yP,rP){
  return new Promise(ok=>{
    const bild=new Image();
    bild.onload=()=>{
      const r=Math.max(30,(rP/100)*bild.width*1.35);
      const x=(xP/100)*bild.width, y=(yP/100)*bild.height;
      const c=document.createElement("canvas");c.width=240;c.height=240;
      c.getContext("2d").drawImage(bild,x-r,y-r,2*r,2*r,0,0,240,240);
      ok(c.toDataURL("image/jpeg",0.8).split(",")[1]);
    };
    bild.src="data:image/jpeg;base64,"+b64;
  });
}

async function stapelBestimmen(b64){
  const key=localStorage.getItem("bl_api_key");
  const namensliste=LAENDER.map(l=>l.n).join("; ");
  const antwort=await fetch("https://blue-lagune-proxy.friesh.workers.dev/",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:8000,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
        {type:"text",text:
`Auf dem Foto liegen mehrere Münzen. Erfasse JEDE erkennbare Münze und nummeriere fortlaufend ab 1, zeilenweise von links oben nach rechts unten.

Wähle als "land" möglichst exakt einen Namen aus diesem Katalog: ${namensliste}

Antworte NUR mit einem JSON-Objekt, ohne Markdown:
{"muenzen":[{"nr":1,"x":12.5,"y":8.3,"r":5.0,"land":"…","nominal":"z.B. 1 Franc","jahr":"falls lesbar, sonst leer","praegestaette":"falls erkennbar, sonst leer","beschreibung":"1 kurzer Satz (Motiv, Material)","sicherheit":"hoch|mittel|niedrig"}]}

x und y = Mittelpunkt der Münze in Prozent (0–100) der Bildbreite bzw. Bildhöhe, r = Münzradius in Prozent der Bildbreite. Unleserliche Münzen trotzdem aufnehmen mit sicherheit "niedrig".`}
      ]}]
    })
  });
  const daten=await antwort.json();
  const text=(daten.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
  if(!text)throw new Error(daten.error?.message||"Keine Antwort erhalten.");
  const roh=text.replace(/```json|```/g,"").trim();
  const anfang=roh.indexOf("{");
  return JSON.parse(roh.slice(anfang));
}

function nummerieren(b64,muenzen){
  return new Promise(ok=>{
    const bild=new Image();
    bild.onload=()=>{
      const c=document.createElement("canvas");
      c.width=bild.width;c.height=bild.height;
      const z=c.getContext("2d");
      z.drawImage(bild,0,0);
      const g=Math.max(16,Math.round(bild.width/45));
      muenzen.forEach(m=>{
        const x=(m.x/100)*bild.width, y=(m.y/100)*bild.height;
        z.beginPath();z.arc(x,y,g*0.95,0,7);
        z.fillStyle="rgba(201,162,75,.95)";z.fill();
        z.lineWidth=Math.max(2,g/8);z.strokeStyle="#241c08";z.stroke();
        z.fillStyle="#241c08";
        z.font="bold "+g+"px Georgia";
        z.textAlign="center";z.textBaseline="middle";
        z.fillText(m.nr,x,y+g*0.05);
      });
      ok(c.toDataURL("image/jpeg",0.85));
    };
    bild.src="data:image/jpeg;base64,"+b64;
  });
}

      const landName=treffer?treffer.n:(m.land||"Unbestimmt");
      const thumb=await ausschnitt(b64,m.x||50,m.y||50,m.r||6);
      await katalogSpeichern({
        land:landName,nominal:m.nominal||"",jahr:m.jahr||"",praegestaette:m.praegestaette||"",
        beschreibung:m.beschreibung||"",katalogwert:"",ebay:"",foto:thumb,
        sicherheit:m.sicherheit||"",angelegt:new Date().toISOString()
      });
      if(treffer){db.sammlung[treffer.n]=(db.sammlung[treffer.n]||0)+1;}
    }
    speichern();zeichnen();
    schleier.classList.remove("offen");

/* ---------- Wert-Recherche (Katalogwert + eBay) ---------- */
async function wertRecherchieren(m,knopf){
  const key=localStorage.getItem("bl_api_key");
  if(!key){einstellungen();return;}
  knopf.disabled=true;knopf.textContent="Recherchiere …";
  const beschreibung=`${m.land}, ${m.nominal} ${m.jahr}${m.praegestaette?", Prägestätte "+m.praegestaette:""} – ${m.beschreibung}`;
  const anfrage=(mitSuche)=>fetch("https://blue-lagune-proxy.friesh.workers.dev/",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key},
    body:JSON.stringify(Object.assign({
      model:"claude-sonnet-4-6",
      max_tokens:1500,
      messages:[{role:"user",content:
`Recherchiere den Sammlerwert dieser Münze: ${beschreibung}

Gesucht: 1) Katalogwert laut gängiger Kataloge (z.B. Jaeger, Schön, Krause/KM) als Spanne je nach Erhaltung, 2) reale Verkaufspreise, insbesondere kürzlich verkaufte vergleichbare Stücke bei eBay.

Antworte am ENDE nur mit einem JSON-Objekt:
{"katalogwert":"z.B. 2–15 € (ss–vz)","ebay":"z.B. meist 3–8 € realisiert","quelle":"kurz: Basis der Angabe"}
Falls keine verlässlichen Zahlen auffindbar sind, gib eine begründete Schätzspanne mit dem Zusatz "(Schätzung)".`}]
    },mitSuche?{tools:[{type:"web_search_20250305",name:"web_search"}]}:{}))
  });
  try{
    let antwort=await anfrage(true);
    let daten=await antwort.json();
    if(daten.error){antwort=await anfrage(false);daten=await antwort.json();}
    const text=(daten.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    const passung=text.match(/\{[\s\S]*\}/);
    if(!passung)throw new Error(daten.error?.message||"Keine verwertbare Antwort.");
    const w=JSON.parse(passung[0]);
    m.katalogwert=w.katalogwert||"";
    m.ebay=w.ebay||"";
    m.quelle=w.quelle||"";
    await katalogAktualisieren(m);
    katalogAnzeigen();
  }catch(fehler){
    knopf.disabled=false;knopf.textContent="Erneut versuchen";
    alert("Wert-Recherche fehlgeschlagen: "+fehler.message);
  }
}
